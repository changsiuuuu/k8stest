# step11.../deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-test-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-test
  template:
    metadata:
      labels:
        app: secret-test
    spec:
      containers:
      - name: db-test-container
        image: alpine # 가벼운 테스트용 리눅스 이미지
        command: ["sleep", "3600"]

        #envFrom 을 이용해서 secret에 있는 모든 값을 환경변수에 넣어줄수도있다
        envFrom:
          - secretRef:
              name: db-pass-secret