apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: nginx-container
        image: nginx:latest
        envFrom:
          - configMapRef:
              name: hello-config # hello-config 라는 이름을 가지고있는 configmap을 이용한다