# step16_cnpg/cnpg-cluster.yaml 파일 생성
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: my-pg-cluster
spec:
  instances: 2 # 숫자 2만 적으면 primary 1대 + replica 1대를 알아서 구성함
  
  # 스토리지 설정
  storage:
    size: 1Gi
    # pv.yaml 파일에 작성한 pv의 class name 을 그대로 적어둔다
    storageClass: pv-postgres
  bootstrap:
    # db를 초기화 하는 용도로 사용한다. 계정, 비밀번호, 초기화 sql 실행 등
    initdb:
      # scott_db 라는 이름의 db를 만들어서 
      database: scott_db
      # 소유권을 scott으로 설정
      owner: scott
      # 계정, 비밀번호는 secret에서 읽어와서 넣어주겠다.
      secret:
        # 이런 시크릿을 만들어야한다
        name: pg-db-secret
      postInitApplicationSQLRefs:
        # configmap에 있는 내용 sql 을 postgres가 준비되면 최초 한번 실행하겠다
        configMapRefs:
          - name: pg-db-init-sql
            key: init.sql
  # postgres 버전 지정
  imageName: ghcr.io/cloudnative-pg/postgresql:15