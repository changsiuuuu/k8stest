# step08../pv.yaml
apiVersion: v1
kind: PersistentVolume # 영속성을 가지는 volume
metadata:
  name: pv01
spec:
  accessModes:
    - ReadWriteOnce # 읽기, 쓰기를 하나의 pod 에서만 가능하도록 한다
  capacity:
    # 1 kilo byte : 1000 byte
    # 1 kibi byte : 1024 byte
    # 1 Mibi byte : 1024 * 1024 byte
    # 1 Gibi byte : 1024 * 1024 * 1024 byte
    storage: 100Mi # Mi 100 Mibi byte : 100 * 1024 * 1024 byte 
  persistentVolumeReclaimPolicy: Retain # Pod(PVC)가 삭제되어도 PV는 유지되도록 Retain 보존한다
  storageClassName: pv-test # 저장공간의 그룹명
  nfs:
    server: 172.16.8.203
    path: /nfs/shared/pv-test-1