# step12_postgres/deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-main
spec:
  replicas: 1 # main db 이기 때문에 하나만 배포한다
  strategy:
    type: Recreate # 혹시 죽었다가 다시 배포될때 기존에 있는걸 삭제하고 다시 만들도록 설정
  selector:
    matchLabels:
      app: pg-main
  template:
    metadata:
      labels:
        app: pg-main
    spec:
      containers:
        - name: pg-main-ctn
          image: postgres:15
          ports:
            - containerPort: 5432
          # DB 계정과 비밀번호는 secrets 로 얻어낸다
          envFrom:
            - secretRef:
                name: postgres-secret
          # 직접 주입할 환경변수는 env에 작성 환경변수명이 secret에 이미 있으면 아래정보로 오버라이딩
          env:
            - name: POSTGRES_DB
              value: scott_db
          volumeMounts:
            - name: pg-init-script
              mountPath: /docker-entrypoint-initdb.d/init.sql # postgres 초기화 파일 경로
              subPath: init.sql # configmap 의 키값을 그대로 subPath에 작성한다
            - name: persistent-volume
              mountPath: /var/lib/postgresql/data
              
      volumes:
        - name: pg-init-script
          configMap:
            name: db-init-config
        - name: persistent-volume
          persistentVolumeClaim:
            claimName: pvc-postgres

