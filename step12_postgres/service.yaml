# service.yaml
apiVersion: v1
kind: Service
metadata:
  name: db-service
spec:
  selector:
    app: pg-main # pod template 에 정의한 pod labels와 일치해야한다.
  type: ClusterIP # 만일 연결할 대상이 statefulset이면 ClusterIP: None 해서 headless로 한다
  ports:
    - protocol: TCP # 생략해도 기본값이 tcp
      port: 5432 # 서비스가 노출할 port
      targetPort: 5432 # 연결할 pod 의 port