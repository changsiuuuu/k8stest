# service.yaml 생성
apiVersion: v1
kind: Service
metadata:
  # 여기에 정의한 이름을 statefulset 에 연결해야한다
  name: headless-svc
spec:
  selector:
    app: stateful-nginx
  # clusterIP: None 의 의미는 ip를 할당하지 않고 Loadbalancing 을 하지 않겠다는의미
  # 단지 selector 에 부합하는 statefulset의 단일 진입점 역할만 하겠다.
  # clusterIP: None 되어있는 서비스를 headless 서비스라고 부른다
  clusterIP: None
  ports:
    - protocol: TCP
      port: 80
  